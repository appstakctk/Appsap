<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Itens</title>
    <!-- Bibliotecas Oficiais Corrigidas e Configuradas via CDN estável -->
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        #contador { text-align: center; font-size: 14px; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background-color: #eee; min-height: 250px; border: none !important; }
        
        /* Estilos internos do Html5QrcodeScanner */
        #reader button { padding: 10px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 10px; background-color: #1c2e24 !important; color: #fdfefe !important; width: 100%; }
        #reader button:hover { opacity: 0.9; }
        #reader input[type="file"] { width: 100%; font-size: 14px; margin-top: 10px; padding: 5px; border: 1px dashed #ccc; border-radius: 4px; box-sizing: border-box; }
        #reader select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; margin-top: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        
        .busca-container { display: flex; gap: 8px; }
        input, select { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-buscar { padding: 0 15px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .resultado { padding: 15px; border: 2px solid #ccc; border-radius: 4px; margin-top: 20px; background-color: #fafafa; transition: all 0.3s ease; }
        
        .conferido { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .status-conferido { background-color: #28a745 !important; }
        .ja-conferido { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        .status-ja-conferido { background-color: #dc3545 !important; }
        .status-badge { display: inline-block; padding: 5px 10px; font-weight: bold; border-radius: 4px; margin-top: 10px; background-color: #6c757d; color: white; }
        
        .btn-acao { width: 100%; padding: 12px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-relatorio { background-color: #3498db; }
        .btn-banco { background-color: #9b59b6; }
        .btn-limpar { background-color: #e74c3c; }

        /* Estilos do Painel do Banco de Dados */
        .painel-bd { background: #fdfefe; border: 1px solid #d5dbdb; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; }
        .painel-bd h4 { margin-top: 15px; margin-bottom: 5px; color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .painel-bd h4:first-of-type { margin-top: 0; }
        .form-cadastro { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .btn-salvar { background-color: #27ae60; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .upload-pdf-box { border: 2px dashed #9b59b6; padding: 15px; border-radius: 6px; background-color: #fcf3cf; text-align: center; margin-bottom: 15px; }
        .upload-pdf-box input { width: 100%; font-size: 14px; }
        
        .lista-itens-bd { max-height: 200px; overflow-y: auto; border: 1px solid #eaeded; padding: 5px; background: #fff; }
        .item-bd { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #f2f3f4; font-size: 13px; }
        .btn-deletar-item { background: #e74c3c; color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }

        /* Estilos do Modal do Relatório */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-conteudo { background-color: white; margin: 10% auto; padding: 20px; border-radius: 8px; max-width: 550px; width: 90%; box-sizing: border-box; }
        .fechar-modal { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        
        .item-relatorio { padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 6px solid; font-size: 14px; }
        .rep-conferido { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .rep-pendente { background-color: #fff3cd; border-color: #ffc107; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner de Conferência</h2>
    <div id="contador">Itens conferidos: <span id="qtdConferidos">0</span></div>
    
    <!-- Visor da Câmera -->
    <div id="reader"></div>

    <!-- Campo manual com botão de disparo -->
    <div class="input-group">
        <label for="codigoManual">Código de Barras / Plaqueta:</label>
        <div class="busca-container">
            <input type="text" id="codigoManual" placeholder="Digite ou bipe a plaqueta...">
            <button class="btn-buscar" onclick="dispararBuscaManual()">OK</button>
        </div>
    </div>

    <!-- Tela de Exibição dos Dados -->
    <div id="painelResultado" class="resultado">
        <p><strong>Item:</strong> <span id="resItem">-</span></p>
        <p><strong>Página do PDF:</strong> <span id="resPagina">-</span></p>
        <div id="resStatus" class="status-badge">AGUARDANDO LEITURA</div>
    </div>

    <button class="btn-acao btn-relatorio" onclick="abrirRelatorio()">Gerar Relatório de Conferência</button>
    <button class="btn-acao btn-banco" onclick="togglePainelBanco()">Gerenciar Banco de Dados (Produtos)</button>
    
    <!-- Painel de Gerenciamento do Banco de Dados -->
    <div id="painelBancoDados" class="painel-bd">
        <h4>Importar PDF Completo</h4>
        <div class="upload-pdf-box">
            <p style="margin-top:0; font-size:13px; font-weight:bold; color:#7e5109;">Suba o arquivo PDF para mapear os códigos:</p>
            <input type="file" id="pdfFileInput" accept=".pdf" onchange="processarUploadPDF(event)">
        </div>

        <h4>Adicionar Item Manual</h4>
        <div class="form-cadastro">
            <input type="text" id="addCodigo" placeholder="Número da Plaqueta (ex: 279387)">
            <input type="text" id="addItem" placeholder="Nome do Produto">
            <input type="text" id="addPagina" placeholder="Página do PDF (ex: Pág. 01)">
            <button class="btn-salvar" onclick="salvarItemBanco()">Salvar no Banco</button>
        </div>
        
        <h4>Itens Cadastrados (<span id="totalCadastrados">0</span>)</h4>
        <div id="listaItensBD" class="lista-itens-bd"></div>
    </div>

    <button class="btn-acao btn-limpar" onclick="limparHistoricoSalvo()">Zerar Lista de Conferidos</button>
</div>

<!-- Janela do Relatório -->
<div id="modalRelatorio" class="modal">
    <div class="modal-conteudo">
        <span class="fechar-modal" onclick="fecharRelatorio()">&times;</span>
        <h3>Relatório de Conferência</h3>
        <p>Legenda: <span style="color:#dc3545; font-weight:bold;">Vermelho = Conferido</span> | <span style="color:#ffc107; font-weight:bold; background:#333; padding:2px 4px; border-radius:3px;">Amarelo = Não Conferido</span></p>
        <hr>
        <div id="listaRelatorio"></div>
    </div>
</div>

<script>
    // Configura o worker do PDF.js exigido pela biblioteca da Mozilla usando a CDN correta
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

    // Inicialização das estruturas de dados e cache local
    let bancoProdutos = JSON.parse(localStorage.getItem('bancoProdutos')) || {};
    let itensConferidos = JSON.parse(localStorage.getItem('itensConferidos')) || [];

    // Inicialização da câmera via html5QrcodeScanner
    function inicializarScanner() {
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 150 },
            experimentalFeatures: { useBarCodeDetectorIfSupported: true }
        });
        html5QrcodeScanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        processarCodigoVerificacao(decodedText.trim());
    }

    function dispararBuscaManual() {
        const input = document.getElementById('codigoManual');
        if(input.value.trim() !== "") {
            processarCodigoVerificacao(input.value.trim());
            input.value = "";
        }
    }

    // Gerenciamento e validação de correspondência da plaqueta
    function processarCodigoVerificacao(codigo) {
        const painel = document.getElementById('painelResultado');
        const resItem = document.getElementById('resItem');
        const resPagina = document.getElementById('resPagina');
        const resStatus = document.getElementById('resStatus');

        painel.className = "resultado";

        if (bancoProdutos[codigo]) {
            const produto = bancoProdutos[codigo];
            resItem.innerText = produto.nome;
            resPagina.innerText = produto.pagina;

            if (itensConferidos.includes(codigo)) {
                painel.classList.add('ja-conferido');
